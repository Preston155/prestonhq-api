<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrestonHQ — Bot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/app.css?v=23" />
    <link rel="stylesheet" href="/assets/css/embed-builder.css?v=23" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <header class="site-header">
      <div class="container inner">
        <a class="logo" href="/dashboard/">
          <span class="logo-mark">PH</span>
          <span>PrestonHQ</span>
        </a>
        <div class="header-actions">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <div id="header-user" class="user-chip hidden">
            <span id="header-name">Admin</span>
            <button id="logout-btn" class="btn btn-secondary btn-sm" type="button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <div id="screen-loading" class="screen center">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p class="loading-text">Starting dashboard…</p>
      </div>
    </div>

    <div id="screen-login" class="screen center hidden">
      <div class="login-card-glow">
        <div class="card card-glass login-card">
          <div class="login-brand">
            <span class="logo-mark lg">PH</span>
            <h1>Bot Dashboard</h1>
            <p class="muted" id="login-gate-message">Sign in to manage Nexora</p>
          </div>
          <form id="login-form">
            <div class="field">
              <label for="login-password">Password</label>
              <input id="login-password" type="password" autocomplete="current-password" placeholder="Enter dashboard password" required />
            </div>
            <p id="login-error" class="login-error hidden"></p>
            <button id="login-submit" class="btn btn-full" type="submit">Enter Dashboard</button>
          </form>
        </div>
      </div>
    </div>

    <div id="screen-app" class="hidden">
      <div class="dashboard-shell">
        <aside class="sidebar">
          <div class="field guild-select">
            <label for="guild-picker">Server</label>
            <select id="guild-picker"></select>
          </div>
          <nav class="sidebar-nav" id="sidebar-nav">
            <div class="nav-indicator" id="nav-indicator"></div>
            <p class="sidebar-label">Main</p>
            <button class="nav-item active" data-tab="overview" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              Overview
            </button>
            <button class="nav-item" data-tab="commands" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
              Commands
            </button>
            <button class="nav-item" data-tab="embed-builder" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
              Message Studio
            </button>
            <p class="sidebar-label">Automation</p>
            <button class="nav-item" data-tab="custom-commands" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              Custom Commands
            </button>
            <button class="nav-item" data-tab="custom-replies" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Custom Replies
            </button>
            <p class="sidebar-label">Modules</p>
            <button class="nav-item" data-tab="tickets" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5H9a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6"/><path d="M15 3h4v4"/><path d="M10 12h4"/><path d="M10 16h4"/></svg>
              Tickets
            </button>
            <button class="nav-item" data-tab="welcome" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Welcome
            </button>
            <button class="nav-item" data-tab="reaction-roles" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              Reaction Roles
            </button>
            <button class="nav-item" data-tab="logging" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Logging
            </button>
            <button class="nav-item" data-tab="settings" type="button">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              Settings
            </button>
          </nav>
        </aside>

        <main class="main-panel">
          <section id="tab-overview" class="tab-panel">
            <header class="panel-header"><div><h2>Overview</h2><p class="muted">Bot status & server snapshot</p></div></header>
            <div class="stats-row" id="overview-stats"></div>
            <div class="card" id="overview-guild"></div>
          </section>
          <section id="tab-embed-builder" class="tab-panel hidden">
            <div id="embed-builder-mount"></div>
          </section>
          <section id="tab-commands" class="tab-panel hidden">
            <header class="panel-header">
              <div>
                <h2>Commands</h2>
                <p class="muted">Enable, disable & cooldowns</p>
              </div>
              <button id="commands-save-all" class="btn btn-sm" type="button">Save all changes</button>
            </header>
            <div class="table-wrap"><table><thead><tr><th>Command</th><th>Type</th><th>On</th><th>CD (sec)</th><th></th></tr></thead><tbody id="commands-table"></tbody></table></div>
          </section>
          <section id="tab-custom-commands" class="tab-panel hidden">
            <header class="panel-header"><div><h2>Custom Commands</h2></div><button id="new-custom-command" class="btn btn-sm" type="button">+ New</button></header>
            <div id="custom-commands-list"></div>
            <div id="custom-command-form" class="card hidden"></div>
          </section>
          <section id="tab-custom-replies" class="tab-panel hidden">
            <header class="panel-header"><div><h2>Custom Replies</h2></div><button id="new-custom-reply" class="btn btn-sm" type="button">+ New</button></header>
            <div id="custom-replies-list"></div>
          </section>
          <section id="tab-tickets" class="tab-panel hidden">
            <header class="panel-header"><div><h2>Tickets</h2></div></header>
            <div id="tickets-active-preview" class="active-preview-wrap hidden"></div>
            <form id="tickets-form" class="card grid-2"></form>
          </section>
          <section id="tab-welcome" class="tab-panel hidden">
            <header class="panel-header"><div><h2>Welcome</h2></div><button id="welcome-test-btn" class="btn btn-secondary btn-sm" type="button">Send Test</button></header>
            <div id="welcome-active-preview" class="active-preview-wrap hidden"></div>
            <form id="welcome-form" class="card grid-2"></form>
          </section>
          <section id="tab-reaction-roles" class="tab-panel hidden">
            <header class="panel-header"><div><h2>Reaction Roles</h2></div></header>
            <div id="reaction-roles-active-preview" class="active-preview-wrap hidden"></div>
            <form id="reaction-roles-form" class="card"></form>
          </section>
          <section id="tab-logging" class="tab-panel hidden">
            <header class="panel-header"><div><h2>Logging</h2></div></header>
            <form id="logging-form" class="card grid-2"></form>
          </section>
          <section id="tab-settings" class="tab-panel hidden">
            <header class="panel-header"><div><h2>Settings</h2></div></header>
            <form id="settings-form" class="card grid-2"></form>
          </section>
        </main>
      </div>
    </div>

    <script src="/assets/js/config.js?v=23"></script>
    <script src="/assets/js/api.js?v=23"></script>
    <script src="/assets/js/embed-builder-templates.js?v=23"></script>
    <script src="/assets/js/embed-builder.js?v=23"></script>
    <script src="/assets/js/app.js?v=23"></script>
  </body>
</html>
