<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrestonHQ — Nexora Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/app.css?v=14" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <header class="site-header">
      <div class="container inner">
        <a class="logo" href="/"><span class="logo-mark">PH</span><span>PrestonHQ</span></a>
        <div class="header-actions">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <a class="btn btn-sm" href="/dashboard/">Dashboard</a>
        </div>
      </div>
    </header>
    <main class="hero container">
      <span class="badge">Nexora Bot</span>
      <h1>Discord bot control panel</h1>
      <p>Manage tickets, commands, welcome messages, and more from one dashboard hosted on your VPS.</p>
      <div class="hero-actions">
        <a class="btn" href="/dashboard/">Open Dashboard</a>
      </div>
    </main>
    <script>
      (function () {
        var saved = localStorage.getItem("ph_theme") || "dark";
        document.documentElement.setAttribute("data-theme", saved);
        document.getElementById("theme-toggle").addEventListener("click", function () {
          var next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("ph_theme", next);
        });
      })();
    </script>
  </body>
</html>
